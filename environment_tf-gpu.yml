name: bclust

channels:
  - conda-forge

dependencies:
  # conda-core
  - python=3.10
  - numpy=1.24.4
  - numba=0.61.2
  - scipy=1.15.2
  - pandas=2.3.2
  - scikit-image=0.25.2
  - opencv=4.12.0
  - scikit-learn=1.7.1
  - joblib=1.5.2
  - matplotlib-base=3.10.5
  - pip
  # conda-spec
  - napari=0.6.4
  - pyqt=5.15.11
  - nd2=0.10.3
  - spyder=6.0.8
  # conda_tf-gpu
  - cudatoolkit=11.2
  - cudnn=8.1
  - pip:
    # pip-core
    - bd-tools==0.3.17
    # pip-spec
    # pip_tf-gpu
    - albumentations==2.0.8
    - segmentation-models==1.0.1
    - tensorflow-gpu==2.10
    - h5py==3.11.0